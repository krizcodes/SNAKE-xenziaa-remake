<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake Game — Computer Graphics Mini Project</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #fff;
    }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 8px; letter-spacing: 2px; color: #4ade80; }
    #hud { display: flex; gap: 24px; font-size: 14px; color: #aaa; margin-bottom: 10px; }
    #hud span { font-weight: 500; color: #fff; }
    #canvasWrap { position: relative; display: flex; align-items: center; justify-content: center; }
    #canvas { border: 1px solid #333; border-radius: 8px; display: block; background: #0a0a0a; }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    #msg { font-size: 22px; font-weight: 500; color: #4ade80; text-align: center; }
    #sub { font-size: 13px; color: #aaa; text-align: center; }
    #startBtn {
      padding: 8px 28px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      font-family: monospace;
      margin-top: 4px;
    }
    #startBtn:hover { background: #2a2a2a; }
    #dpad { display: none; flex-direction: column; align-items: center; gap: 4px; margin-top: 12px; }
    #dpad .row { display: flex; gap: 4px; }
    .dkey {
      width: 48px; height: 48px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none;
    }
    .dkey:active { background: #2a2a2a; }
    #info { margin-top: 12px; font-size: 12px; color: #555; }
    @media(max-width: 520px) { #dpad { display: flex; } }
  </style>
</head>
<body>

  <h1>SNAKE</h1>

  <div id="hud">
    Score: <span id="scoreEl">0</span>
    &nbsp;|&nbsp;
    Best: <span id="bestEl">0</span>
    &nbsp;|&nbsp;
    Level: <span id="lvlEl">1</span>
  </div>

  <div id="canvasWrap">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="msg">Snake Game</div>
      <div id="sub">BCA 4th Sem — Computer Graphics</div>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <div id="dpad">
    <div class="row"><button class="dkey" id="dU">▲</button></div>
    <div class="row">
      <button class="dkey" id="dL">◄</button>
      <button class="dkey" id="dD">▼</button>
      <button class="dkey" id="dR">►</button>
    </div>
  </div>

  <div id="info">Arrow Keys / WASD to move</div>

  <script>
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const scoreEl  = document.getElementById('scoreEl');
    const bestEl   = document.getElementById('bestEl');
    const lvlEl    = document.getElementById('lvlEl');
    const overlay  = document.getElementById('overlay');
    const msg      = document.getElementById('msg');
    const sub      = document.getElementById('sub');
    const startBtn = document.getElementById('startBtn');

    const COLS = 20, ROWS = 20, CELL = 20;

    let snake, dir, nextDir, food, score, best = 0, lvl, loop, running = false;
    let particles = [];

    function initGame() {
      snake   = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir     = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0; lvl = 1; particles = [];
      placeFood(); updateHUD();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function getSpeed() { return Math.max(80, 200 - lvl * 20); }

    function startGame() {
      overlay.style.display = 'none';
      initGame(); running = true;
      clearInterval(loop);
      loop = setInterval(tick, getSpeed());
    }

    function tick() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver(); return;
      }
      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10 * lvl;
        spawnParticles(food.x, food.y);
        if (score >= lvl * 50) { lvl++; clearInterval(loop); loop = setInterval(tick, getSpeed()); }
        placeFood();
      } else {
        snake.pop();
      }
      updateHUD(); draw();
    }

    function spawnParticles(gx, gy) {
      const cx = gx * CELL + CELL / 2, cy = gy * CELL + CELL / 2;
      const colors = ['#f87171','#fb923c','#facc15','#4ade80','#60a5fa','#c084fc','#f472b6'];
      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2, speed = 1 + Math.random() * 2;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }
    }

    function updateParticles() {
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.life -= 0.06;
        p.vx *= 0.92; p.vy *= 0.92;
      });
    }

    function gameOver() {
      clearInterval(loop); running = false;
      if (score > best) best = score;
      updateHUD();
      msg.textContent = 'Game Over';
      sub.textContent = 'Score: ' + score;
      startBtn.textContent = 'Play Again';
      overlay.style.display = 'flex';
    }

    function updateHUD() {
      scoreEl.textContent = score;
      bestEl.textContent  = best;
      lvlEl.textContent   = lvl;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, ROWS * CELL); ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(COLS * CELL, j * CELL); ctx.stroke();
      }

      // Food
      const fx = food.x * CELL + CELL / 2, fy = food.y * CELL + CELL / 2, fr = CELL / 2 - 2;
      ctx.save();
      ctx.shadowColor = '#f87171'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.arc(fx, fy, fr, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(fx - 2, fy - 2, fr * 0.35, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Snake body
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        const r = Math.floor(34 + 77 * t), g = Math.floor(197 - 97 * t), b = Math.floor(94 + 80 * t);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        const pad = i === 0 ? 1 : 2;
        const radius = i === 0 ? 5 : 3;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2, radius);
        ctx.fill();

        // Eyes on head
        if (i === 0) {
          const ex1 = seg.x * CELL + CELL / 2 + (dir.y !== 0 ? -4 : dir.x * 4);
          const ey1 = seg.y * CELL + CELL / 2 + (dir.x !== 0 ? -4 : dir.y * 4);
          const ex2 = seg.x * CELL + CELL / 2 + (dir.y !== 0 ?  4 : dir.x * 4);
          const ey2 = seg.y * CELL + CELL / 2 + (dir.x !== 0 ?  4 : dir.y * 4);
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath(); ctx.arc(ex1 + dir.x * 0.5, ey1 + dir.y * 0.5, 1.2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(ex2 + dir.x * 0.5, ey2 + dir.y * 0.5, 1.2, 0, Math.PI * 2); ctx.fill();
        }
      });

      // Particles
      updateParticles();
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    // Keyboard controls
    document.addEventListener('keydown', e => {
      const keys = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d',' '];
      if (keys.includes(e.key)) e.preventDefault();
      if (!running) { if (keys.includes(e.key)) startGame(); return; }
      if (e.key === 'ArrowUp'    || e.key === 'w') { if (dir.y !==  1) nextDir = { x:  0, y: -1 }; }
      if (e.key === 'ArrowDown'  || e.key === 's') { if (dir.y !== -1) nextDir = { x:  0, y:  1 }; }
      if (e.key === 'ArrowLeft'  || e.key === 'a') { if (dir.x !==  1) nextDir = { x: -1, y:  0 }; }
      if (e.key === 'ArrowRight' || e.key === 'd') { if (dir.x !== -1) nextDir = { x:  1, y:  0 }; }
    });

    // D-pad controls (mobile)
    document.getElementById('dU').addEventListener('click', () => { if (!running) startGame(); else if (dir.y !==  1) nextDir = { x:  0, y: -1 }; });
    document.getElementById('dD').addEventListener('click', () => { if (!running) startGame(); else if (dir.y !== -1) nextDir = { x:  0, y:  1 }; });
    document.getElementById('dL').addEventListener('click', () => { if (!running) startGame(); else if (dir.x !==  1) nextDir = { x: -1, y:  0 }; });
    document.getElementById('dR').addEventListener('click', () => { if (!running) startGame(); else if (dir.x !== -1) nextDir = { x:  1, y:  0 }; });

    startBtn.addEventListener('click', startGame);

    // Initial draw
    initGame(); draw();
  </script>
</body>
</html>
